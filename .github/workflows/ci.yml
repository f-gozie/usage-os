name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        # macOS is the only shipping target (CLAUDE.md: "No Windows/Linux in
        # v1"). Linux stays as cheap headless CI: it hosts the binding-freshness
        # gate and exercises the platform-agnostic core (repository, migrations,
        # category engine). Windows was dropped — the tauri-specta/specta stack
        # fails to link there (STATUS_ENTRYPOINT_NOT_FOUND) and we will never
        # ship it, so gating on it is wasted effort.
        include:
          - os: ubuntu-latest
            rust: stable
          - os: macos-latest
            rust: stable

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.rust }}
          components: clippy, rustfmt

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      # tauri-build validates that every `externalBin` path EXISTS at compile time (on all
      # platforms), so cargo build/test/clippy need the sidecar binary present. The real
      # FoundationModels sidecar is macOS-26-only Swift (built by sidecar/build.sh + the
      # non-blocking Swift lane below), and the app is never RUN in CI — tests use the
      # FakeNarrator (C19). So a stub satisfies the bundler; nothing executes it.
      - name: Stage placeholder sidecar binary
        shell: bash
        run: |
          TRIPLE="$(rustc --print host-tuple 2>/dev/null || rustc -vV | sed -n 's/^host: //p')"
          mkdir -p src-tauri/binaries
          printf '#!/bin/sh\n' > "src-tauri/binaries/usageos-ai-$TRIPLE"
          chmod +x "src-tauri/binaries/usageos-ai-$TRIPLE"
          echo "staged src-tauri/binaries/usageos-ai-$TRIPLE"

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxss-dev \
            libxdo-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Check TypeScript types
        run: npx tsc --noEmit

      - name: Run TypeScript tests
        run: npx vitest run

      - name: Check Rust formatting
        working-directory: src-tauri
        run: cargo fmt --all -- --check

      - name: Run Clippy (deny warnings)
        working-directory: src-tauri
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run Rust tests
        working-directory: src-tauri
        run: cargo test

      # Binding-freshness gate (hard rules 2 + 8): the generated src/bindings.ts
      # must match what the export test produces. Linux-only — pure codegen, no
      # macOS APIs, and a single OS avoids line-ending false positives.
      - name: Regenerate IPC bindings
        if: runner.os == 'Linux'
        working-directory: src-tauri
        run: cargo test export_bindings

      - name: Assert IPC bindings are fresh
        if: runner.os == 'Linux'
        run: git diff --exit-code -- src/bindings.ts

      - name: Build Rust (validate compilation)
        working-directory: src-tauri
        run: cargo build

  # The real Foundation Models sidecar (Swift) only compiles against the macOS 26 SDK with
  # Apple Intelligence — unavailable on standard GitHub runners. This lane attempts the build
  # so it starts passing the moment hosted runners reach macOS 26; until then it skips
  # gracefully (green) and never gates the cross-platform `test` matrix (C19/C20).
  sidecar-swift:
    name: Sidecar (Swift, macOS 26 — non-blocking)
    runs-on: macos-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Build usageos-ai sidecar (skips if SDK < macOS 26)
        shell: bash
        run: |
          SDK_VER="$(xcrun --sdk macosx --show-sdk-version 2>/dev/null || echo 0)"
          MAJOR="${SDK_VER%%.*}"
          echo "macOS SDK version: $SDK_VER"
          if [ "${MAJOR:-0}" -ge 26 ]; then
            echo "Building the FoundationModels sidecar against the macOS $SDK_VER SDK."
            ( cd sidecar/usageos-ai && swift build -c release )
          else
            echo "SDK < 26 — FoundationModels is unavailable on this runner; skipping the build."
            echo "(The sidecar is verified on-device + by sidecar/build.sh; see the spike README.)"
          fi
