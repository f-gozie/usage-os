*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:660px;height:400px;overflow:hidden;}
:root{--bg:#EEEBE1;--ink:#161616;--muted:#6A6A66;--track:#D7D3C7;--blue:#1B45BE;--red:#E0241B;--gold:#EAB308;--rule:rgba(22,22,22,.14);}
.stage{position:relative;width:660px;height:400px;background:var(--bg);
  font-family:"Jost",system-ui,sans-serif;-webkit-font-smoothing:antialiased;color:var(--ink);}
/* hairline inner frame — quiet brand border */
.frame{position:absolute;inset:14px;border:1.5px solid var(--rule);pointer-events:none;}
/* top lockup */
.lockup{position:absolute;top:34px;left:0;right:0;display:flex;align-items:center;justify-content:center;gap:14px;}
.lockup .mk{width:38px;height:38px;display:block;}
.lockup .wm{font-family:"Anton",sans-serif;font-size:40px;line-height:1;letter-spacing:.045em;text-transform:uppercase;}
.tagline{position:absolute;top:92px;left:0;right:0;text-align:center;font-weight:500;font-size:13px;
  letter-spacing:.02em;color:var(--muted);}
/* the drag cue, centered in the gap between the two icons (icon centers at x=180 & x=480, y=180) */
.cue{position:absolute;top:163px;left:248px;width:164px;height:34px;}
.cuelabel{position:absolute;top:138px;left:0;right:0;text-align:center;
  font-weight:600;font-size:10.5px;letter-spacing:.26em;text-transform:uppercase;color:var(--blue);}
/* bottom instruction + version */
.howto{position:absolute;bottom:46px;left:0;right:0;text-align:center;font-weight:500;font-size:13px;color:var(--muted);}
.howto b{color:var(--ink);font-weight:600;}
.ver{position:absolute;bottom:24px;left:0;right:0;text-align:center;
  font-weight:600;font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);opacity:.72;}
</style></head>

  <div class="frame"></div>

  <div class="lockup">

      <path d="M71.21 75.28 A33 33 0 0 1 26.26 72.92" fill="none" stroke="var(--red)" stroke-width="8"/>
      <path d="M21.42 66.50 A33 33 0 0 1 46.55 17.18" fill="none" stroke="var(--gold)" stroke-width="8"/>
    </svg>
    <span class="wm">USAGEOS</span>
  </div>
  <div class="tagline">Private, on-device time tracking for macOS</div>

  <div class="cuelabel">Drag to install</div>
