<!DOCTYPE html>
<html lang="en" data-theme="paper">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UsageOS — Week</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Jost:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root,[data-theme="paper"]{
  --bg:#EEEBE1; --surface:#F6F3EA; --fg:#161616; --muted:#6A6A66;
  --edge:#161616; --rule:rgba(22,22,22,.16); --track:#D7D3C7;
  --c-deep:#1B45BE; --c-research:#E0241B; --c-comms:#EAB308; --c-breaks:#161616;
  --now:#161616; --casing:#161616; --on-ink:#EEEBE1;
  --bar-bg:#161616; --bar-fg:#EEEBE1;
}
[data-theme="warm"]{
  --bg:#1A1916; --surface:#24221A; --fg:#EDE9DD; --muted:#938E81;
  --edge:#4A453B; --rule:rgba(237,233,221,.14); --track:#39342B;
  --c-deep:#3358E0; --c-research:#F0463C; --c-comms:#F2BC0C; --c-breaks:#CFC9B8;
  --now:#EDE9DD; --casing:transparent; --on-ink:#1A1916;
  --bar-bg:#100F0C; --bar-fg:#EDE9DD;
}
[data-theme="black"]{
  --bg:#0E0E0E; --surface:#171719; --fg:#F4F4F2; --muted:#8C8C8A;
  --edge:#2F2F2F; --rule:rgba(244,244,242,.12); --track:#252525;
  --c-deep:#3A6BF0; --c-research:#FF4B40; --c-comms:#F5C518; --c-breaks:#C6C6C4;
  --now:#F4F4F2; --casing:transparent; --on-ink:#0E0E0E;
  --bar-bg:#000000; --bar-fg:#F4F4F2;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{background:var(--bg);transition:background .25s;}
body{font-family:'Jost',system-ui,sans-serif;color:var(--fg);-webkit-font-smoothing:antialiased;display:flex;justify-content:center;padding:28px 18px;}
button{font-family:inherit;cursor:pointer;}
a{color:inherit;text-decoration:none;}
.app{width:100%;max-width:1000px;background:var(--bg);border:3px solid var(--edge);border-radius:5px;overflow:hidden;}
.tb{background:var(--bar-bg);display:flex;align-items:center;gap:9px;padding:11px 16px;}
.tbd{width:12px;height:12px;border-radius:50%;}
.tbn{flex:1;text-align:center;color:var(--bar-fg);font-weight:600;font-size:12px;letter-spacing:.34em;text-transform:uppercase;margin-left:-46px;}
.tbs{color:rgba(255,255,255,.6);font-size:10.5px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;display:flex;align-items:center;gap:6px;}
.tbs .live{width:8px;height:8px;border-radius:50%;background:var(--c-comms);animation:pulse 2.4s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.hd{display:flex;justify-content:space-between;align-items:flex-end;padding:18px 22px 0;}
.brand{font-family:'Anton',sans-serif;font-size:36px;line-height:.82;text-transform:uppercase;letter-spacing:.01em;}
.brand .o{color:var(--c-research);}
.hd .right{display:flex;align-items:center;gap:16px;}
.hd .date{text-align:right;font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);line-height:1.6;}
.themesw{display:flex;border:2px solid var(--edge);}
.themesw button{font-weight:600;font-size:10px;letter-spacing:.08em;text-transform:uppercase;background:transparent;color:var(--muted);border:none;padding:7px 9px;}
.themesw button+button{border-left:2px solid var(--edge);}
.themesw button.on{background:var(--edge);color:var(--bg);}
.tabs{display:flex;align-items:center;gap:0;margin:16px 22px 0;border-bottom:3px solid var(--edge);}
.tabs a{font-weight:600;font-size:12px;letter-spacing:.1em;text-transform:uppercase;padding:11px 16px;color:var(--muted);position:relative;top:3px;border-bottom:3px solid transparent;}
.tabs a.on{color:var(--fg);border-bottom-color:var(--fg);}
.panel{padding:22px;}

/* week summary */
.wsum{display:flex;border:3px solid var(--edge);margin-bottom:24px;}
.wsum .s{flex:1;padding:16px 18px;}
.wsum .s+.s{border-left:2px solid var(--edge);}
.wsum .n{font-family:'Anton',sans-serif;font-size:32px;line-height:.85;}
.wsum .n.blue{color:var(--c-deep);}
.wsum .k{font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-top:9px;}
.sec{font-family:'Anton',sans-serif;font-size:16px;letter-spacing:.04em;text-transform:uppercase;margin:0 0 16px;display:flex;align-items:center;gap:10px;}
.sec::after{content:"";flex:1;height:2px;background:var(--edge);}
.wgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:10px;}
.wd{text-align:center;cursor:pointer;border:2px solid transparent;padding:10px 5px;transition:border-color .15s,background .15s;}
.wd:hover{border-color:var(--edge);background:var(--surface);}
.wd.tdy{border-color:var(--edge);background:var(--surface);}
.wd svg{width:100%;display:block;transition:transform .2s;}
.wd:hover svg{transform:scale(1.05);}
.wd .dl{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-top:9px;}
.wd.tdy .dl{color:var(--c-research);}
.wd .dt{font-family:'Anton',sans-serif;font-size:16px;margin-top:2px;}
.whint{text-align:center;font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-top:18px;}
.foot{background:var(--bar-bg);color:var(--bar-fg);font-size:10px;font-weight:600;letter-spacing:.22em;text-transform:uppercase;text-align:center;padding:11px;}
@media(max-width:680px){.brand{font-size:28px;}.wsum{flex-direction:column;}.wsum .s+.s{border-left:none;border-top:2px solid var(--edge);}}
</style>
</head>
<body>
<div class="app">
  <div class="tb">
    <span class="tbd" style="background:var(--c-research)"></span>
    <span class="tbd" style="background:var(--c-comms)"></span>
    <span class="tbd" style="background:var(--c-deep)"></span>
    <span class="tbn">UsageOS</span>
    <span class="tbs"><span class="live"></span>Tracking</span>
  </div>
  <div class="hd">
    <div class="brand">USAGE<span class="o">OS</span></div>
    <div class="right">
      <div class="date">Week of<br>15–21 June 2026</div>
      <div class="themesw" id="themesw"><button data-t="paper" class="on">Paper</button><button data-t="warm">Warm</button><button data-t="black">Black</button></div>
    </div>
  </div>
  <div class="tabs">
    <a href="day.html">Day</a>
    <a href="week.html" class="on">Week</a>
    <a href="timeline.html">Timeline</a>
    <a href="settings.html">Settings</a>
  </div>

  <section class="panel">
    <div class="wsum" id="wsum"></div>
    <div class="sec">This week</div>
    <div class="wgrid" id="wgrid"></div>
    <div class="whint">Click a day to open it ↑</div>
  </section>

  <div class="foot">Your data never leaves this machine</div>
</div>

<script>
(function(){
"use strict";
var NS="http://www.w3.org/2000/svg";
function A(s,e,c){return{s:s,e:e,cat:c};}
var DAYS=[
 {dow:"Sun",num:15,segs:[A(600,660,"research"),A(840,900,"comms"),A(1080,1140,"deep")]},
 {dow:"Mon",num:16,segs:[A(540,720,"deep"),A(720,780,"comms"),A(780,960,"deep"),A(960,1080,"research")]},
 {dow:"Tue",num:17,segs:[A(510,540,"comms"),A(540,720,"deep"),A(750,900,"deep"),A(960,1050,"research")]},
 {dow:"Wed",num:18,segs:[A(480,540,"comms"),A(540,750,"deep"),A(810,960,"deep"),A(960,1110,"research"),A(1110,1140,"breaks")]},
 {dow:"Thu",num:19,segs:[A(600,720,"deep"),A(720,750,"comms"),A(780,870,"research"),A(930,1050,"deep"),A(1050,1080,"breaks")]},
 {dow:"Fri",num:20,segs:[A(510,540,"comms"),A(540,690,"deep"),A(690,720,"research"),A(780,840,"comms"),A(840,960,"deep"),A(960,990,"breaks"),A(990,1080,"deep")]},
 {dow:"Sat",num:21,today:true,now:930,segs:[A(450,480,"comms"),A(480,570,"deep"),A(570,585,"breaks"),A(585,675,"deep"),A(675,705,"research"),A(750,780,"comms"),A(780,855,"deep"),A(855,885,"breaks"),A(885,930,"research")]}
];
var CV={deep:"--c-deep",research:"--c-research",comms:"--c-comms",breaks:"--c-breaks"};
function cssv(n){return getComputedStyle(document.documentElement).getPropertyValue(n).trim();}
function durM(d){var h=Math.floor(d/60),m=d%60;return h>0?(m>0?h+"h "+m+"m":h+"h"):m+"m";}
function active(segs){return segs.reduce(function(a,s){return a+(s.e-s.s);},0);}
function deep(segs){return segs.reduce(function(a,s){return a+(s.cat==="deep"?s.e-s.s:0);},0);}
function pol(cx,cy,t,r){var a=t/1440*2*Math.PI;return[cx+r*Math.sin(a),cy-r*Math.cos(a)];}
function arcPath(cx,cy,r,a,b){var lg=(b-a)>720?1:0,p0=pol(cx,cy,a,r),p1=pol(cx,cy,b,r);
  return "M"+p0[0].toFixed(2)+" "+p0[1].toFixed(2)+" A"+r+" "+r+" 0 "+lg+" 1 "+p1[0].toFixed(2)+" "+p1[1].toFixed(2);}
function el(t,a){var e=document.createElementNS(NS,t);for(var k in a)e.setAttribute(k,a[k]);return e;}

function miniSVG(day){var cased=cssv("--casing")!=="transparent"&&cssv("--casing")!=="";
  var s=el("svg",{viewBox:"0 0 80 80",width:"100%",role:"img","aria-label":day.dow});
  s.appendChild(el("circle",{cx:40,cy:40,r:29,fill:"none",stroke:cssv("--track"),"stroke-width":6}));
  day.segs.forEach(function(seg){var a=seg.s+3,b=(seg.e-3>seg.s+3)?seg.e-3:seg.e;
    if(cased)s.appendChild(el("path",{d:arcPath(40,40,29,a,b),stroke:cssv("--casing"),"stroke-width":8,fill:"none"}));
    s.appendChild(el("path",{d:arcPath(40,40,29,a,b),stroke:cssv(CV[seg.cat]),"stroke-width":cased?6:6,fill:"none"}));});
  if(day.now){var t1=pol(40,40,day.now,34),t2=pol(40,40,day.now-20,41),t3=pol(40,40,day.now+20,41);
    s.appendChild(el("polygon",{points:t1[0].toFixed(1)+","+t1[1].toFixed(1)+" "+t2[0].toFixed(1)+","+t2[1].toFixed(1)+" "+t3[0].toFixed(1)+","+t3[1].toFixed(1),fill:cssv("--now")}));}
  return s;}

function render(){
  var totActive=0,best=0,bestDay="";
  DAYS.forEach(function(d){totActive+=active(d.segs);if(deep(d.segs)>best){best=deep(d.segs);bestDay=d.dow;}});
  document.getElementById("wsum").innerHTML=
    '<div class="s"><div class="n">'+durM(totActive)+'</div><div class="k">Active this week</div></div>'+
    '<div class="s"><div class="n">'+durM(Math.round(totActive/7))+'</div><div class="k">Avg / day</div></div>'+
    '<div class="s"><div class="n blue">'+bestDay+'</div><div class="k">Deepest day</div></div>';
  var g=document.getElementById("wgrid");g.innerHTML="";
  DAYS.forEach(function(d){var cell=document.createElement("a");cell.className="wd"+(d.today?" tdy":"");cell.href="day.html";
    cell.appendChild(miniSVG(d));
    var dl=document.createElement("div");dl.className="dl";dl.textContent=d.dow+" "+d.num;cell.appendChild(dl);
    var dt=document.createElement("div");dt.className="dt";dt.textContent=durM(active(d.segs));cell.appendChild(dt);
    g.appendChild(cell);});
}
document.getElementById("themesw").addEventListener("click",function(e){var b=e.target.closest("button[data-t]");if(!b)return;
  document.documentElement.setAttribute("data-theme",b.dataset.t);
  document.querySelectorAll("#themesw button").forEach(function(x){x.classList.toggle("on",x===b);});render();});
render();
})();
</script>
</body>
</html>
