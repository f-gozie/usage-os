[package]
name = "usage-os"
version = "0.1.0"
description = "A personal desktop utility app that tracks computer usage activity"
authors = ["you"]
edition = "2021"

[lib]
name = "usage_os_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-opener = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Generated IPC (hard rule 2, D17/D27). The specta v2 stack is release-candidate;
# pin exactly and move as a set. NOTE: the standard's provisional rc.24 pin does
# NOT build — specta rc.24 removed `#[specta(rename)]` on containers, which the
# current tauri (2.9.3, the latest 2.x) still uses in its specta integration. The
# highest combo that compiles with tauri 2.9.3 is the rc.20 trio (specta rc.20
# still supports container rename). Move all four together; never float.
tauri-specta = { version = "=2.0.0-rc.20", features = ["derive", "typescript"] }
specta = "=2.0.0-rc.20"
specta-typescript = "=0.0.7"
thiserror = "2"

active-win-pos-rs = "0.8"
user-idle = "0.6"
rusqlite = { version = "0.31", features = ["bundled"] }
tokio = { version = "1", features = ["rt", "time", "sync"] }

# Native macOS capture (Phase 1.2b, D29/D32). Behind the `capture` trait and
# `#[cfg(target_os = "macos")]` — never imported above `capture/macos/`. Exact pins
# proven by the spikes (objc2 0.6.4 / objc2-* 0.3.2 / block2 0.6.2). The whole AX
# surface (incl. the AXObserver family) lives in objc2-application-services — no
# accessibility-sys (D29). libc also backs proc_pidinfo (terminal cwd).
[target.'cfg(target_os = "macos")'.dependencies]
objc2 = "0.6"
objc2-app-kit = { version = "0.3.2", features = [
    "NSWorkspace",
    "NSRunningApplication",
    "libc",
] }
objc2-foundation = { version = "0.3.2", features = [
    "NSString",
    "NSNotification",
    "NSOperation",
    "block2",
] }
objc2-application-services = { version = "0.3.2", features = [
    "AXUIElement",
    "AXError",
    "libc",
] }
objc2-core-foundation = { version = "0.3.2", features = [
    "CFString",
    "CFDictionary",
    "CFNumber",
    "CFRunLoop",
] }
block2 = "0.6"
libc = "0.2"

