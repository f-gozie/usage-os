# cargo-about config for generating THIRD-PARTY-LICENSES (M5 distribution obligation).
# Mirrors the cargo-deny allowlist (deny.toml) — same permissive set we already vet.
# Scoped to the Apple targets we actually ship (matches deny.toml [graph].targets).
accepted = [
    "MIT",
    "MIT-0",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "0BSD",
    "BSL-1.0",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
    "ISC",
    "MPL-2.0",
    "Unicode-3.0",
    "Unlicense",
    "Zlib",
]

targets = ["aarch64-apple-darwin", "x86_64-apple-darwin"]
